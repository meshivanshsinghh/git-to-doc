<svg viewBox="0 0 720 430" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="How git-to-doc verify works. A git diff is read blind by two code models from different families, qwen2.5-coder and deepseek-coder-v2, before either sees the commit message. Each model's independent reading, with file and line citations, is compared against the commit message. A divergence both models agree on is HIGH confidence. One that only a single model raises is possible, and marked verify manually.">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#57606a"/>
    </marker>
  </defs>

  <rect x="6" y="6" width="708" height="418" rx="12" fill="#f6f8fa" stroke="#d0d7de"/>

  <text x="360" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2328">How git-to-doc verify works</text>
  <text x="360" y="62" text-anchor="middle" font-size="12.5" fill="#57606a">two independent code models, from different families</text>

  <rect x="300" y="80" width="120" height="38" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="360" y="104" text-anchor="middle" font-size="14" fill="#1f2328">git diff</text>

  <path d="M360,118 C360,134 230,134 230,150" fill="none" stroke="#57606a" stroke-width="1.5" marker-end="url(#a)"/>
  <path d="M360,118 C360,134 490,134 490,150" fill="none" stroke="#57606a" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="138" y="150" width="184" height="52" rx="8" fill="#ddf4ff" stroke="#54aeff"/>
  <text x="230" y="172" text-anchor="middle" font-size="13.5" font-weight="600" fill="#0a3069">qwen2.5-coder</text>
  <text x="230" y="190" text-anchor="middle" font-size="11.5" fill="#0a3069">reads the diff blind</text>

  <rect x="398" y="150" width="184" height="52" rx="8" fill="#ddf4ff" stroke="#54aeff"/>
  <text x="490" y="172" text-anchor="middle" font-size="13.5" font-weight="600" fill="#0a3069">deepseek-coder-v2</text>
  <text x="490" y="190" text-anchor="middle" font-size="11.5" fill="#0a3069">reads the diff blind</text>

  <path d="M230,202 C230,222 360,222 360,240" fill="none" stroke="#57606a" stroke-width="1.5" marker-end="url(#a)"/>
  <path d="M490,202 C490,222 360,222 360,240" fill="none" stroke="#57606a" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="176" y="240" width="368" height="50" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="360" y="262" text-anchor="middle" font-size="13.5" fill="#1f2328">compare each reading against the commit message</text>
  <text x="360" y="280" text-anchor="middle" font-size="11.5" fill="#57606a">every claim must cite a file and line</text>

  <path d="M360,290 C360,308 230,308 230,326" fill="none" stroke="#57606a" stroke-width="1.5" marker-end="url(#a)"/>
  <path d="M360,290 C360,308 490,308 490,326" fill="none" stroke="#57606a" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="120" y="326" width="220" height="66" rx="8" fill="#ffebe9" stroke="#ff8182"/>
  <text x="230" y="353" text-anchor="middle" font-size="14" font-weight="700" fill="#82071e">HIGH confidence</text>
  <text x="230" y="373" text-anchor="middle" font-size="12" fill="#82071e">both models agree</text>

  <rect x="380" y="326" width="220" height="66" rx="8" fill="#fff8c5" stroke="#d4a72c"/>
  <text x="490" y="353" text-anchor="middle" font-size="14" font-weight="700" fill="#7d4e00">possible</text>
  <text x="490" y="373" text-anchor="middle" font-size="12" fill="#7d4e00">only one flagged, verify</text>
</svg>
